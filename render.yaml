services:
  - type: web
    name: TheMovieProviderBot
    runtime: python3
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    region: oregon
    
    buildCommand: |
      apt-get update && apt-get install -y git
      pip install --upgrade pip
      pip install -r requirements.txt
    
    startCommand: python bot.py
    
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URI
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: LOG_CHANNEL
        sync: false
      - key: PREMIUM_LOGS
        sync: false
      - key: ADMINS
        sync: false
      - key: AUTH_USERS
        sync: false
      - key: PORT
        value: "8080"
